<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body{
        margin: 0;
      }

      .container{
        background-color: black;
        height: 100vh;
        width: 100%;
        position: relative;
        overflow: hidden;
        display: grid;
        place-items: center;
      }

      .glow{
        width: 100%;
        border-radius: 100px;
        aspect-ratio: 1 / 1;
        position: absolute;

        background: conic-gradient(
        #ff006f5f,
        #8338ec37,
        #3a85ff68,
        #ff006f49
        );
        filter: blur(400px);
        animation: rotate 100s linear infinite;
      }


    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
      .glow::before {
        content: "";
        position: absolute;
        background: black;
        inset: 400px;
        border-radius: 50%;

      }


    </style>
  </head>
  <body>
    <div class="container">
      <div class="glow glow1"></div>
    </div>
  </body>
</html>
